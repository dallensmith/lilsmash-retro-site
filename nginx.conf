server {
    listen 80;
    server_name tv.lilsmash.com;

    root /usr/share/nginx/html/tv.lilsmash.com;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # Ensure resources inside the subdomain folder are found
    location /resources/ {
        alias /usr/share/nginx/html/tv.lilsmash.com/resources/;
    }
}

server {
    listen 80;
    server_name lilsmash.com www.lilsmash.com _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        # Prevent the main site from trying to serve the subdomain folder as a directory
        location ^~ /tv.lilsmash.com/ {
            deny all;
        }
        try_files $uri $uri/ =404;
    }
}
